<!doctype html>
<html lang="pl">
	<head>
		<meta charset="UTF-8" />
		<title>Pong - Basic</title>
		<style>
			body {
				display: flex;
				flex-direction: column;
				align-items: center;
				background-color: #111;
				color: white;
				font-family: monospace;
				margin-top: 50px;
			}
			canvas {
				background-color: #222;
				border: 4px solid #fff;
			}
		</style>
	</head>
	<body>
		<h2>Multiplayer Pong (Authoritative Server)</h2>
		<p>Open two browser tabs to play against yourself.</p>
		<canvas id="gameCanvas" width="800" height="600"></canvas>

		<script>
			const canvas = document.getElementById("gameCanvas");
			const ctx = canvas.getContext("2d");
			const socket = new WebSocket("ws://localhost:8080");

			socket.onmessage = (event) => {
				const state = JSON.parse(event.data);
				drawGame(state);
			};

			function drawGame(state) {
				ctx.clearRect(0, 0, canvas.width, canvas.height);
				ctx.fillStyle = "#fff";

				for (let i = 0; i < canvas.height; i += 40) {
					ctx.fillRect(canvas.width / 2 - 2, i, 4, 20);
				}

				ctx.fillRect(50, state.p1.y, 20, 100);

				ctx.fillRect(730, state.p2.y, 20, 100);

				ctx.fillRect(state.ball.x, state.ball.y, 15, 15);

				ctx.font = "48px monospace";
				ctx.fillText(state.p1.score, canvas.width / 4, 60);
				ctx.fillText(state.p2.score, (3 * canvas.width) / 4, 60);
			}

			function sendInput(type, keyEvent) {
				let key = null;
				if (keyEvent.key === "ArrowUp" || keyEvent.key === "w") key = "UP";
				if (keyEvent.key === "ArrowDown" || keyEvent.key === "s") key = "DOWN";

				if (key) {
					keyEvent.preventDefault();
					socket.send(JSON.stringify({ type, key }));
				}
			}

			window.addEventListener("keydown", (e) => sendInput("keydown", e));
			window.addEventListener("keyup", (e) => sendInput("keyup", e));
		</script>
	</body>
</html>
